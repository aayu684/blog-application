{% extends 'base.html' %}
{% block title %}Delete Post - Blog Application{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete Post</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete the post <strong>"{{ object.title }}"</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mt-4">
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                        <a href="{% url 'post_detail' object.pk %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
